[nosetests]
verbosity=2
with-spec=1
spec-color=1

[coverage:run]
source = service
omit = */tests/*, */test_*.py

[coverage:report]
show_missing = True

[flake8]
max-line-length = 99
exclude = .git,__pycache__,build,dist,.venv,venv

[pep8]
max-line-length = 99

[pylint]
ignore = .git,__pycache__,build,dist,.venv,venv
max-line-length = 99
