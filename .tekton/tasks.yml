apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: cleanup
spec:
  steps:
    - name: cleanup
      image: alpine
      script: |
        echo "Cleaning up workspace..."

---
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: flake8
spec:
  steps:
    - name: flake8
      image: python:3.9
      workingDir: /workspace/source
      script: |
        pip install flake8
        flake8 service/ --count --select=E9,F63,F7,F82 --show-source --statistics

---
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: nose
spec:
  steps:
    - name: nose
      image: python:3.9
      workingDir: /workspace/source
      script: |
        pip install -r requirements.txt
        nosetests --with-spec --spec-color
